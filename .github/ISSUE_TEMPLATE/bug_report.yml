name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out all sections below.

  - type: input
    id: version
    attributes:
      label: TeleVault Version
      description: Run `tvt --version` to get the version
      placeholder: "e.g., 3.0.1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Run `python --version` to get the version
      placeholder: "e.g., 3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: "When I run `tvt push file.txt`, it fails with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "The file should be uploaded successfully"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands that trigger the bug
      placeholder: |
        1. `tvt login`
        2. `tvt push largefile.zip`
        3. ... error occurs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Run with `--debug` flag for detailed logs: `tvt --debug push file.txt`
        Also check: `~/.local/share/televault/televault.log`
      placeholder: "Paste logs here (remove any sensitive info like passwords or tokens)"
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Config (if relevant)
      description: Contents of `~/.config/televault/config.json` (remove any sensitive values)
      placeholder: '{"channel_id": ..., "chunk_size": ...}'
    validations:
      required: false